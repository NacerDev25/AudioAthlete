<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioAthlete - Your Audio Workout Timer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#22c55e">
    <link rel="apple-touch-icon" href="icon-512.png">
</head>
<body>
    <div class="container" role="main">
        <header>
            <div class="header-top">
                <h1 id="app-title">AudioAthlete</h1>
                <button id="settings-toggle" class="btn-icon" aria-label="Settings">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" id="svg-circle" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
            <p id="app-description">Smart audio-guided workout timer</p>
        </header>

        <!-- Settings Modal (Initially Hidden) -->
        <div id="settings-modal" class="modal" aria-hidden="true" role="dialog" aria-labelledby="settings-title">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="settings-title">Settings</h2>
                    <button id="close-settings" class="btn-close" aria-label="Close Settings">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="input-group">
                        <label for="language-select">Language / اللغة:</label>
                        <select id="language-select">
                            <option value="en" selected>English</option>
                            <option value="ar">العربية</option>
                        </select>
                    </div>
                    
                    <!-- PWA Install Section -->
                    <div id="install-section" class="input-group" style="display: none; margin-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1.5rem;">
                        <button id="install-button" class="btn btn-install" style="width: 100%; background-color: var(--accent-blue); color: var(--bg-color);">
                            Install App on Home Screen
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Workout Inputs Section -->
        <section class="settings" aria-labelledby="settings-heading">
            <h2 id="settings-heading">Workout Settings</h2>
            
            <!-- Total Time Selection -->
            <div class="setting-block" id="block-total-time">
                <h3 id="label-total-time" tabindex="-1">Total Workout Time (minutes)</h3>
                <div class="chip-group" role="radiogroup" aria-labelledby="label-total-time">
                    <button class="chip" data-value="10" aria-checked="false" role="radio">10</button>
                    <button class="chip selected" data-value="20" aria-checked="true" role="radio">20</button>
                    <button class="chip" data-value="30" aria-checked="false" role="radio">30</button>
                    <button class="chip" data-value="45" aria-checked="false" role="radio">45</button>
                    <button class="chip" data-value="60" aria-checked="false" role="radio">60</button>
                </div>
                <input type="hidden" id="total-time" value="20">
            </div>

            <!-- Work Interval Selection -->
            <div class="setting-block" id="block-work-interval">
                <h3 id="label-work-interval" tabindex="-1">Work Interval (seconds)</h3>
                <div class="chip-group" role="radiogroup" aria-labelledby="label-work-interval">
                    <button class="chip" data-value="30" aria-checked="false" role="radio">30s</button>
                    <button class="chip" data-value="45" aria-checked="false" role="radio">45s</button>
                    <button class="chip" data-value="60" aria-checked="false" role="radio">60s</button>
                    <button class="chip selected" data-value="180" aria-checked="true" role="radio">3m</button>
                    <button class="chip" data-value="300" aria-checked="false" role="radio">5m</button>
                </div>
                <input type="hidden" id="work-interval" value="180">
            </div>

            <!-- Rest Interval Selection -->
            <div class="setting-block" id="block-rest-interval">
                <h3 id="label-rest-interval" tabindex="-1">Rest Interval (seconds)</h3>
                <div class="chip-group" role="radiogroup" aria-labelledby="label-rest-interval">
                    <button class="chip" data-value="15" aria-checked="false" role="radio">15s</button>
                    <button class="chip" data-value="30" aria-checked="false" role="radio">30s</button>
                    <button class="chip selected" data-value="60" aria-checked="true" role="radio">60s</button>
                    <button class="chip" data-value="90" aria-checked="false" role="radio">90s</button>
                    <button class="chip" data-value="120" aria-checked="false" role="radio">2m</button>
                </div>
                <input type="hidden" id="rest-interval" value="60">
            </div>

            <div class="summary" aria-live="polite" id="rounds-summary">
                Expected Rounds: <span id="rounds-count">5</span>
            </div>
        </section>

        <!-- Timer Display Section -->
        <section class="timer-display" aria-labelledby="timer-heading">
            <h2 id="timer-heading" class="sr-only">Timer Display</h2>
            
            <div class="status-box" aria-live="assertive">
                <div id="current-phase" class="phase-label">Ready?</div>
                <div id="current-round" class="round-label">Round: 0 / 0</div>
            </div>

            <div class="countdown-box" role="timer" aria-atomic="true">
                <span id="timer-numbers" class="timer-text">00:00</span>
            </div>
        </section>

        <!-- Control Buttons -->
        <section class="controls">
            <button id="start-btn" class="btn btn-start">Start Workout</button>
            <button id="pause-btn" class="btn btn-pause" disabled>Pause</button>
            <button id="reset-btn" class="btn btn-reset">Reset</button>
        </section>

        <!-- Hidden area for screen reader announcements only -->
        <div id="announcement-region" class="sr-only" aria-live="assertive"></div>
    </div>

    <!-- PWA Toast Notification -->
    <div id="pwa-toast" class="toast-container" role="alert" aria-live="polite">
        <div class="toast-content">
            <span id="toast-msg">You can install this app from settings.</span>
        </div>
    </div>

    <script src="js.js"></script>
</body>
</html>
